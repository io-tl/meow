{{template "mobile_head" .}}

    <!-- Header -->
    <header class="mobile-header">
        <div class="header-left">
            <a href="/mobile" class="header-back">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>
            <span class="header-title">Hosts</span>
        </div>
        <div class="header-right">
            <span class="results-badge" id="results-count">0</span>
            <button class="header-btn" id="filter-toggle-btn" title="Filters">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Search Bar -->
    <div class="mobile-search">
        <div class="search-input-wrap">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none">
                <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
                <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <input type="text" id="search-input" placeholder="IP, hostname, domain..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
            <button class="search-clear" id="search-clear" style="display:none">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Active Filters -->
    <div class="active-chips" id="active-chips" style="display:none">
        <div class="chips-scroll" id="chips-scroll"></div>
        <button class="clear-chips" id="clear-chips">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
    </div>

    <!-- Filter Drawer -->
    <div class="filter-drawer-backdrop" id="filter-backdrop"></div>
    <div class="filter-drawer" id="filter-drawer">
        <div class="drawer-header">
            <h3>Filters</h3>
            <button class="drawer-close" id="drawer-close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <div class="drawer-body">
            <div class="drawer-field">
                <label>Country</label>
                <select id="filter-country">
                    <option value="">All Countries</option>
                </select>
            </div>
            <div class="drawer-field">
                <label>Port</label>
                <input type="text" id="filter-port" placeholder="22, 80, 443..." inputmode="numeric">
            </div>
            <div class="drawer-field">
                <label>Technology</label>
                <input type="text" id="filter-technology" placeholder="nginx, apache...">
            </div>
            <div class="drawer-toggle">
                <label class="toggle-label">
                    <input type="checkbox" id="filter-verified">
                    <span class="toggle-switch"></span>
                    <span>Hide unverified</span>
                </label>
            </div>
            <div class="drawer-actions">
                <button class="btn-apply" id="btn-apply">Apply</button>
                <button class="btn-clear" id="btn-clear">Clear</button>
            </div>

            <div class="drawer-section">
                <h4>Top Ports</h4>
                <div class="facet-chips" id="port-facets"></div>
            </div>
        </div>
    </div>

    <!-- Hosts List -->
    <main class="mobile-content" id="hosts-content">
        <div class="hosts-list" id="hosts-list">
            <!-- Dynamically populated -->
        </div>

        <!-- Loading -->
        <div class="list-loading" id="list-loading" style="display:none">
            <div class="pull-spinner"></div>
        </div>

        <!-- Empty State -->
        <div class="list-empty" id="list-empty" style="display:none">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" opacity="0.3">
                <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
                <path d="M12 7v5l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <p>No hosts found</p>
        </div>

        <!-- Pagination -->
        <div class="mobile-pagination" id="pagination" style="display:none">
            <button class="page-btn" id="prev-page" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <polyline points="15 18 9 12 15 6" stroke="currentColor" stroke-width="2"/>
                </svg>
            </button>
            <span class="page-info" id="page-info">1 / 1</span>
            <button class="page-btn" id="next-page">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <polyline points="9 18 15 12 9 6" stroke="currentColor" stroke-width="2"/>
                </svg>
            </button>
        </div>

        <div class="bottom-spacer"></div>
    </main>

    <!-- Host Detail Sheet -->
    <div class="detail-sheet-backdrop" id="detail-backdrop"></div>
    <div class="detail-sheet" id="detail-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
            <h3 id="detail-ip">-</h3>
            <button class="sheet-close" id="sheet-close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <div class="sheet-body" id="sheet-body">
            <!-- Dynamically populated -->
        </div>
    </div>

    {{template "mobile_nav" .}}
